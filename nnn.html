<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dành riêng cho em ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Hiệu ứng trái tim rơi */
        @keyframes fall {
            0% { top: -10%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .heart {
            position: fixed;
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* Khung nền trắng */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 25px 20px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 480px;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #764ba2;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #999;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 18px;
        }

        /* Layout 2 cột */
        .login-content {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }

        /* ===== HÌNH ẢNH ===== */
        .image-section {
            flex: 1;
            display: flex;
        }

        .profile-rect-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid #ff6b9d;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
            animation: pulse 2.5s ease infinite;
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* ===== BÀN PHÍM SỐ ===== */
        .keypad-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Ô hiển thị dots */
        .password-display {
            width: 100%;
            height: 44px;
            background: #f5f5fa;
            border: 2px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            letter-spacing: 6px;
            color: #764ba2;
            font-weight: bold;
            transition: all 0.3s;
        }

        .password-display.active {
            border-color: #ff6b9d;
            background: #fff;
            box-shadow: 0 3px 12px rgba(255, 107, 157, 0.2);
        }

        .placeholder-text {
            font-size: 11px;
            letter-spacing: 0;
            color: #bbb;
            font-weight: normal;
        }

        /* Grid bàn phím */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            flex: 1;
        }

        .key-btn {
            width: 100%;
            height: 100%;
            min-height: 44px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            background: linear-gradient(145deg, #f5f5fa, #e8e8f0);
            color: #444;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.8);
            user-select: none;
        }

        .key-btn:hover {
            background: linear-gradient(145deg, #ede8f5, #ddd4ee);
            transform: scale(1.05);
        }

        .key-btn:active {
            transform: scale(0.93);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.12);
        }

        .key-btn.delete {
            background: linear-gradient(145deg, #ffe0e6, #ffc8d4);
            color: #e74c3c;
            font-size: 18px;
        }

        .key-btn.submit {
            background: linear-gradient(135deg, #ff6b9d, #c471ed);
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.35);
        }

        .key-btn.submit:hover {
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5);
        }

        /* Thông báo lỗi */
        .error-message {
            color: #ff4757;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-7px); }
            40% { transform: translateX(7px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* Responsive mobile */
        @media (max-width: 520px) {
            .login-container {
                width: 92%;
                padding: 20px 16px 16px;
            }

            .login-content {
                flex-direction: column-reverse;
            }

            .image-section {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- Hiệu ứng trái tim rơi -->
    <div id="hearts"></div>

    <!-- ========== TRANG ĐĂNG NHẬP ========== -->
    <div class="login-container" id="loginPage">
        <h1>Chỉ dành cho em thôi nhé 💕</h1>
        <p class="subtitle">Nhập mật khẩu để khám phá điều đặc biệt...</p>

        <div class="login-content">

            <!-- HÌNH ẢNH BÊN TRÁI -->
            <div class="image-section">
                <img src="n1.jpg" alt="Profile" class="profile-rect-img">
            </div>

            <!-- BÀN PHÍM SỐ BÊN PHẢI -->
            <div class="keypad-section">
                <div class="password-display" id="passwordDisplay">
                    <span class="placeholder-text" id="placeholderText">🔐 Nhập mật khẩu...</span>
                    <span id="dotsDisplay" style="display:none;"></span>
                </div>

                <div class="keypad">
                    <button class="key-btn" onclick="pressKey('1')">1</button>
                    <button class="key-btn" onclick="pressKey('2')">2</button>
                    <button class="key-btn" onclick="pressKey('3')">3</button>
                    <button class="key-btn" onclick="pressKey('4')">4</button>
                    <button class="key-btn" onclick="pressKey('5')">5</button>
                    <button class="key-btn" onclick="pressKey('6')">6</button>
                    <button class="key-btn" onclick="pressKey('7')">7</button>
                    <button class="key-btn" onclick="pressKey('8')">8</button>
                    <button class="key-btn" onclick="pressKey('9')">9</button>
                    <button class="key-btn delete" onclick="deleteKey()">⌫</button>
                    <button class="key-btn" onclick="pressKey('0')">0</button>
                    <button class="key-btn submit" onclick="checkPassword()">💖</button>
                </div>
            </div>

        </div>

        <p class="error-message" id="errorMsg">Ối! Sai mật khẩu rồi, thử lại đi em 🥺</p>
    </div>

    <script>
        // ====== HIỆU ỨNG TRÁI TIM ======
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['💖','💕','💗','💓','🌸'][Math.floor(Math.random()*5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        setInterval(createHeart, 800);

        // ====== BÀN PHÍM SỐ ======
        let enteredPassword = '';
        const MAX_LENGTH = 12;

        function updateDisplay() {
            const display    = document.getElementById('passwordDisplay');
            const placeholder = document.getElementById('placeholderText');
            const dots       = document.getElementById('dotsDisplay');

            if (enteredPassword.length === 0) {
                placeholder.style.display = 'inline';
                dots.style.display = 'none';
                display.classList.remove('active');
            } else {
                placeholder.style.display = 'none';
                dots.style.display = 'inline';
                dots.textContent = '●'.repeat(enteredPassword.length);
                display.classList.add('active');
            }
        }

        function pressKey(num) {
            if (enteredPassword.length >= MAX_LENGTH) return;
            enteredPassword += num;
            updateDisplay();
        }

        function deleteKey() {
            enteredPassword = enteredPassword.slice(0, -1);
            updateDisplay();
        }

        // ====== KIỂM TRA MẬT KHẨU ======
        function checkPassword() {
            const correctPassword = '05072010';

            if (enteredPassword === correctPassword) {
                // ✅ Nhập đúng → xử lý tại đây
                alert('Chào mừng em đã mở khóa! 💖');
            } else {
                const display = document.getElementById('passwordDisplay');
                display.classList.add('shake');
                setTimeout(() => display.classList.remove('shake'), 500);

                document.getElementById('errorMsg').style.display = 'block';
                enteredPassword = '';
                updateDisplay();

                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }

        // Hỗ trợ bàn phím vật lý
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') pressKey(e.key);
            else if (e.key === 'Backspace') deleteKey();
            else if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
