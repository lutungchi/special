<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dành riêng cho em ✨</title>
  <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
  <style>
    :root{
      --pink:#ff6b9d;
      --violet:#764ba2;
      --paper:#fff7fb;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100%;height:100%;overflow:hidden;
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      /* ── BACKGROUND HỒNG ── */
      background:linear-gradient(135deg,#ffb3cc 0%,#ff69b4 40%,#ff85c2 70%,#ffaad4 100%);
    }

    /* ══════════════════════════════
       FALLING ICONS (tim + hoa + bong bóng)
    ══════════════════════════════ */
    #fallLayer{
      position:fixed;inset:0;z-index:1;
      pointer-events:none;overflow:hidden;
    }
    .fi{
      position:absolute;top:-10vh;
      pointer-events:none;user-select:none;
      animation:fiDrop linear forwards;
      opacity:.88;
    }
    @keyframes fiDrop{
      0%{opacity:.88;}
      80%{opacity:.75;}
      100%{transform:translate(var(--dx),112vh) rotate(var(--dr));opacity:0;}
    }

    /* ══════════════════════════════
       STAGE
    ══════════════════════════════ */
    .stage{
      position:relative;z-index:10;
      height:100vh;
      display:grid;place-items:center;
      padding:14px;
    }
    .scene{display:none;}
    .scene.active{display:block;}

    /* ══════════════════════════════
       LOGIN
    ══════════════════════════════ */
    #loginScene.active{
      display:grid;place-items:center;height:100vh;
    }
    .login-box{
      background:rgba(255,255,255,.95);
      padding:25px 25px 20px;
      border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      text-align:center;
      width:min(480px,95vw);
      animation:fadeInUp .8s ease;
    }
    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(-20px);}
      to{opacity:1;transform:translateY(0);}
    }
    .login-box h1{color:var(--violet);font-size:18px;margin-bottom:4px;}
    .login-box .sub{color:#999;font-size:12px;font-style:italic;margin-bottom:18px;}
    .login-row{display:flex;gap:16px;align-items:stretch;}
    .img-col{flex:1;display:flex;}
    .img-col img{
      width:100%;height:100%;min-height:220px;
      object-fit:cover;border-radius:16px;
      border:3px solid var(--pink);
      box-shadow:0 8px 24px rgba(255,107,157,.3);
      animation:pulse 2.5s ease infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
    .kp-col{flex:1;display:flex;flex-direction:column;gap:10px;}
    .pw-disp{
      height:46px;background:#f5f5fa;
      border:2px solid #ddd;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;letter-spacing:7px;color:var(--violet);font-weight:700;
      transition:all .3s;
    }
    .pw-disp.on{border-color:var(--pink);background:#fff;box-shadow:0 3px 12px rgba(255,107,157,.2);}
    .pw-ph{font-size:11px;letter-spacing:0;color:#bbb;font-weight:400;}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;}
    .kbtn{
      width:100%;height:100%;min-height:42px;border:none;
      border-radius:12px;font-size:20px;font-weight:700;
      cursor:pointer;user-select:none;transition:all .13s;
      background:linear-gradient(145deg,#f5f5fa,#e8e8f0);color:#444;
      box-shadow:2px 2px 6px rgba(0,0,0,.1),-1px -1px 4px rgba(255,255,255,.8);
    }
    .kbtn:hover{background:linear-gradient(145deg,#ede8f5,#ddd4ee);transform:scale(1.05);}
    .kbtn:active{transform:scale(.93);}
    .kbtn.del{background:linear-gradient(145deg,#ffe0e6,#ffc8d4);color:#e74c3c;font-size:18px;}
    .kbtn.go{background:linear-gradient(135deg,var(--pink),#c471ed);color:#fff;box-shadow:0 4px 15px rgba(255,107,157,.35);}
    .err-msg{color:#ff4757;font-size:12px;text-align:center;min-height:18px;margin-top:8px;}
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
    .shake{animation:shake .35s ease;}

    /* ══════════════════════════════
       CAKE SCENE
    ══════════════════════════════ */
    #cakeScene.active{
      display:block;
      position:fixed;inset:0;z-index:5;
      width:100vw;height:100vh;
    }
    #threeCanvas{
      position:absolute;top:0;left:0;
      width:100%;height:100%;display:block;
    }

    /* ── Chữ trang trí quanh bánh ── */
    .cake-text{
      position:absolute;
      z-index:15;
      color:#fff;
      font-weight:900;
      text-shadow:
        0 0 20px rgba(255,100,150,.8),
        0 4px 15px rgba(0,0,0,.3),
        2px 2px 0 rgba(255,150,180,.5);
      pointer-events:none;
      letter-spacing:4px;
      line-height:1.1;
    }
    /* DÀNH CHO EM — trên cùng, giữa */
    #txtTop{
      top:12%;left:50%;
      transform:translateX(-50%);
      font-size:clamp(28px,3.5vw,42px);
      text-align:center;
      white-space:nowrap;
      animation:floatText 3s ease-in-out infinite;
    }
    /* HAPPY — bên trái */
    #txtLeft{
      top:50%;left:3%;
      transform:translateY(-50%);
      font-size:clamp(75px,4vw,52px);
      writing-mode:vertical-rl;
      text-orientation:mixed;
      transform:translateY(-50%) rotate(180deg);
      animation:floatText 3.5s ease-in-out infinite .5s;
    }
    /* BIRTHDAY — bên phải */
    #txtRight{
      top:50%;right:3%;
      transform:translateY(-50%);
      font-size:clamp(70px,4vw,52px);
      writing-mode:vertical-rl;
      text-orientation:mixed;
      animation:floatText 3.5s ease-in-out infinite 1s;
    }
    @keyframes floatText{
      0%,100%{filter:drop-shadow(0 0 8px rgba(255,180,210,.8));}
      50%{filter:drop-shadow(0 0 20px rgba(255,100,160,1));}
    }

    /* nút Letter */
    #letterBtn{
      position:absolute;bottom:28px;left:50%;
      transform:translateX(-50%);
      z-index:20;border:none;cursor:pointer;
      padding:13px 52px;border-radius:50px;
      font-size:1.1rem;font-weight:800;letter-spacing:3px;color:#fff;
      background:linear-gradient(135deg,#ff6b9d,#c44dff);
      box-shadow:0 0 30px rgba(196,77,255,.5);
      animation:btnGlow 2.5s ease infinite alternate;
      transition:transform .2s;
    }
    #letterBtn:hover{transform:translateX(-50%) scale(1.07);}
    @keyframes btnGlow{
      from{box-shadow:0 0 20px rgba(255,107,157,.4);}
      to{box-shadow:0 0 45px rgba(196,77,255,.75);}
    }

    /* ══════════════════════════════
       LETTER OVERLAY
    ══════════════════════════════ */
    #overlay{
      position:fixed;inset:0;z-index:30;
      display:none;place-items:center;padding:16px;
      background:rgba(8,4,22,.72);
      backdrop-filter:blur(7px);
    }
    #overlay.show{display:grid;animation:fadeOv .3s ease;}
    @keyframes fadeOv{from{opacity:0;}to{opacity:1;}}

    .ov-frame{
      position:relative;
      width:min(740px,95vw);
      height:min(545px,calc(100vh - 32px));
      border-radius:26px;padding:9px;
      background:linear-gradient(135deg,#ff85b3,#c471ed,#85b3ff,#ff85b3);
      background-size:300% 300%;
      animation:borderAnim 4s ease infinite,popIn .4s cubic-bezier(.2,.9,.2,1);
      box-shadow:0 28px 70px rgba(0,0,0,.45);
    }
    @keyframes borderAnim{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
    @keyframes popIn{from{opacity:0;transform:scale(.86) translateY(22px);}to{opacity:1;transform:scale(1) translateY(0);}}

    .ov-paper{
      width:100%;height:100%;border-radius:19px;
      background:var(--paper);
      border:1.5px dashed rgba(255,107,157,.5);
      position:relative;overflow:hidden;
      display:flex;flex-direction:column;
    }

    /* THIỆP */
    #card{
      position:absolute;inset:0;border-radius:19px;z-index:4;
      background:linear-gradient(135deg,#ff9bc4,#ffd1e7,#e8b4f8);
      display:grid;place-items:center;
      transition:opacity .4s,transform .4s;
    }
    #card::before{
      content:"";position:absolute;inset:-30px;
      background:
        radial-gradient(circle at 20% 20%,rgba(255,255,255,.9) 0 7px,transparent 9px),
        radial-gradient(circle at 80% 25%,rgba(255,255,255,.85) 0 6px,transparent 8px),
        radial-gradient(circle at 55% 75%,rgba(255,255,255,.8) 0 6px,transparent 8px),
        radial-gradient(circle at 25% 80%,rgba(255,255,255,.75) 0 5px,transparent 7px);
      opacity:.6;
    }
    #card.gone{opacity:0;transform:scale(.95);pointer-events:none;}
    .openBtn{
      position:relative;z-index:5;
      padding:15px 32px;border-radius:15px;
      border:2.5px solid rgba(255,255,255,.82);
      background:rgba(255,255,255,.28);
      color:#7b2c58;font-weight:900;font-size:17px;
      cursor:pointer;backdrop-filter:blur(12px);
      box-shadow:0 14px 34px rgba(0,0,0,.14);
      transition:transform .15s;
    }
    .openBtn:hover{transform:scale(1.07);}

    /* THƯ */
    #letter{
      position:absolute;inset:0;
      opacity:0;pointer-events:none;
      transition:opacity .45s ease;
      display:flex;flex-direction:column;
    }
    #letter.show{opacity:1;pointer-events:auto;}

    /* stickers góc trên */
    .stk{
      position:absolute;top:10px;font-size:38px;z-index:8;
      animation:stkBounce 2s ease-in-out infinite;
    }
    .stk.l{left:12px;}
    .stk.r{right:12px;animation-delay:.6s;}
    @keyframes stkBounce{0%,100%{transform:rotate(-5deg) scale(1);}50%{transform:rotate(6deg) scale(1.18);}}

    /* bó hồng góc dưới phải */
    .roses{
      position:absolute;right:12px;bottom:12px;
      font-size:52px;z-index:8;
      animation:roseSway 2.5s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes roseSway{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}

    /* ── 3 ảnh fan góc dưới trái (có zoom) ── */
    .fan{
      position:absolute;left:12px;bottom:12px;
      width:152px;height:108px;z-index:8;
    }
    .fan img{
      position:absolute;width:82px;height:82px;
      border-radius:12px;object-fit:cover;
      border:2.5px solid rgba(255,255,255,.92);
      box-shadow:0 10px 22px rgba(0,0,0,.22);
      background:#f0d0e0;
      cursor:pointer;
      transition:transform .2s,box-shadow .2s;
    }
    .fan img:hover{transform:rotate(0deg) scale(1.12)!important;z-index:9;box-shadow:0 14px 28px rgba(0,0,0,.35);}
    .fan img:nth-child(1){left:0;bottom:0;transform:rotate(-14deg);}
    .fan img:nth-child(2){left:35px;bottom:8px;transform:rotate(2deg);z-index:2;}
    .fan img:nth-child(3){left:70px;bottom:0;transform:rotate(15deg);}

    /* ── ZOOM LIGHTBOX ── */
    #lightbox{
      position:fixed;inset:0;z-index:100;
      display:none;place-items:center;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
      cursor:pointer;
      animation:fadeOv .25s ease;
    }
    #lightbox.show{display:grid;}
    #lightbox img{
      max-width:min(480px,80vw);
      max-height:min(480px,75vh);
      width:auto;height:auto;
      border-radius:20px;
      border:4px solid rgba(255,255,255,.85);
      box-shadow:0 24px 60px rgba(0,0,0,.5);
      animation:zoomIn .3s cubic-bezier(.2,.9,.2,1);
      cursor:default;
      object-fit:cover;
    }
    @keyframes zoomIn{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}

    /* nội dung thư */
    .ltr-title{
      text-align:center;font-weight:900;color:#7b2c58;
      font-size:17px;
      padding-top:62px;padding-bottom:8px;flex-shrink:0;
    }
    /* ── body chữ to + căn giữa ── */
    .ltr-body{
      font-size:15.5px;
      line-height:1.85;
      color:#3b2a35;
      padding:0 18px;
      flex:1;overflow:hidden;
      white-space:pre-wrap;
      text-align:center;   /* ✅ căn giữa */
    }
    .ltr-foot{
      flex-shrink:0;height:50px;
      display:flex;align-items:center;justify-content:center;
    }
    .subBtn{
      display:none;padding:10px 22px;border-radius:999px;border:0;
      cursor:pointer;color:#fff;font-weight:900;font-size:14px;
      background:linear-gradient(135deg,var(--pink),#c471ed);
      box-shadow:0 12px 26px rgba(255,107,157,.38);
      transition:transform .15s;
    }
    .subBtn:hover{transform:scale(1.06);}
    .subBtn.show{display:inline-block;}

    .ov-hint{
      position:absolute;bottom:6px;left:0;right:0;
      text-align:center;font-size:11px;
      color:rgba(255,255,255,.5);
      pointer-events:none;z-index:40;
    }

    @media(max-width:480px){
      .login-row{flex-direction:column-reverse;gap:14px;}
      .img-col{height:160px;}
      #txtTop{font-size:18px;}
      #txtLeft,#txtRight{font-size:22px;}
    }
  </style>
</head>
<body>

<!-- Falling icons layer -->
<div id="fallLayer"></div>

<div class="stage">

  <!-- ══ LOGIN ══ -->
  <div class="scene active" id="loginScene">
    <div class="login-box">
      <h1>Chỉ dành cho em thôi nhé 💕</h1>
      <p class="sub">Nhập mật khẩu để khám phá điều đặc biệt...</p>
      <div class="login-row">
        <div class="img-col"><img src="https://cdn.phototourl.com/free/2026-07-07-b2d2f316-9f69-4957-a090-251068106706.jpg" alt=""/></div>
        <div class="kp-col">
          <div class="pw-disp" id="pwDisp">
            <span class="pw-ph" id="pwPh">🔐 Nhập mật khẩu...</span>
            <span id="pwDots" style="display:none"></span>
          </div>
          <div class="keypad">
            <button class="kbtn" onclick="kp('1')">1</button>
            <button class="kbtn" onclick="kp('2')">2</button>
            <button class="kbtn" onclick="kp('3')">3</button>
            <button class="kbtn" onclick="kp('4')">4</button>
            <button class="kbtn" onclick="kp('5')">5</button>
            <button class="kbtn" onclick="kp('6')">6</button>
            <button class="kbtn" onclick="kp('7')">7</button>
            <button class="kbtn" onclick="kp('8')">8</button>
            <button class="kbtn" onclick="kp('9')">9</button>
            <button class="kbtn del" onclick="kpDel()">⌫</button>
            <button class="kbtn" onclick="kp('0')">0</button>
            <button class="kbtn go" onclick="kpCheck()">💖</button>
          </div>
        </div>
      </div>
      <div class="err-msg" id="errMsg"></div>
    </div>
  </div>

  <!-- ══ CAKE ══ -->
  <div class="scene" id="cakeScene">
    <canvas id="threeCanvas"></canvas>

    <!-- chữ trang trí -->
    <div class="cake-text" id="txtTop">✨ DÀNH CHO EM ✨</div>
    <div class="cake-text" id="txtLeft">HAPPY</div>
    <div class="cake-text" id="txtRight">BIRTHDAY</div>

    <button id="letterBtn">✉ LETTER</button>
  </div>

</div>

<!-- ══ LETTER OVERLAY ══ -->
<div id="overlay">
  <div class="ov-frame">
    <div class="ov-paper">
      <div id="card">
        <button class="openBtn" id="openBtn">Mở thư 💌</button>
      </div>
      <div id="letter">
        <div class="stk l">🎀</div>
        <div class="stk r">⭐</div>
        <div class="roses">💐</div>
        <div class="fan">
          <img src="https://cdn.phototourl.com/free/2026-07-07-112410ae-bd6d-4e2e-b9c0-3d1bac383841.jpg" alt="" onclick="zoomImg(this)"/>
          <img src="https://cdn.phototourl.com/free/2026-07-07-db7743bc-8114-466e-87ac-28f3d9a688ea.jpg" alt="" onclick="zoomImg(this)"/>
          <img src="https://cdn.phototourl.com/free/2026-07-07-b9bbb6b7-06e7-4ae2-80bb-9856ef381d57.jpg" alt="" onclick="zoomImg(this)"/>
        </div>
        <div class="ltr-title">💌 Gửi em — cô gái dễ thương nhất hôm nay 🌸</div>
        <div class="ltr-body" id="ltrBody"></div>
        <div class="ltr-foot">
          <button class="subBtn" id="confessBtn">Lời anh muốn nói 💗</button>
        </div>
      </div>
    </div>
  </div>
  <p class="ov-hint">Nhấp ra ngoài để đóng</p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lbImg" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<script>
/* ════════════════════════════════
   FALLING ICONS — tim + hoa + bong bóng
════════════════════════════════ */
const ICONS=['💗','💖','💕','💓','🌸','🌷','🌺','🫧','🎈','✨','🎀','💮'];
function spawnIcon(){
  const el=document.createElement('div');
  el.className='fi';
  el.textContent=ICONS[Math.floor(Math.random()*ICONS.length)];
  const dur=9+Math.random()*6;
  const size=12+Math.random()*16;
  el.style.cssText=`left:${Math.random()*100}vw;font-size:${size}px;animation-duration:${dur}s;`;
  el.style.setProperty('--dx',(-18+Math.random()*36).toFixed(1)+'vw');
  el.style.setProperty('--dr',(-80+Math.random()*160).toFixed(0)+'deg');
  document.getElementById('fallLayer').appendChild(el);
  setTimeout(()=>el.remove(),(dur+.5)*1000);
}
setInterval(spawnIcon,480);

/* ════════════════════════════════
   KEYPAD
════════════════════════════════ */
let pw='';
const CORRECT='05072010';
function kpUpdate(){
  const d=document.getElementById('pwDisp');
  const ph=document.getElementById('pwPh');
  const dots=document.getElementById('pwDots');
  if(!pw.length){ph.style.display='inline';dots.style.display='none';d.classList.remove('on');}
  else{ph.style.display='none';dots.style.display='inline';dots.textContent='●'.repeat(pw.length);d.classList.add('on');}
}
function kp(n){if(pw.length>=12)return;pw+=n;kpUpdate();}
function kpDel(){pw=pw.slice(0,-1);kpUpdate();}
function kpCheck(){
  if(pw===CORRECT){
    document.getElementById('loginScene').classList.remove('active');
    document.getElementById('cakeScene').classList.add('active');
    requestAnimationFrame(()=>requestAnimationFrame(buildCake));
  }else{
    const d=document.getElementById('pwDisp');
    d.classList.add('shake');
    setTimeout(()=>d.classList.remove('shake'),400);
    const e=document.getElementById('errMsg');
    e.textContent='Ối! Sai mật khẩu rồi, thử lại đi em 🥺';
    pw='';kpUpdate();
    setTimeout(()=>e.textContent='',3000);
  }
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('loginScene').classList.contains('active'))return;
  if(e.key>='0'&&e.key<='9')kp(e.key);
  else if(e.key==='Backspace')kpDel();
  else if(e.key==='Enter')kpCheck();
});

/* ════════════════════════════════
   BUILD CAKE (THREE.JS)
════════════════════════════════ */
function buildCake(){
  if(typeof THREE==='undefined'){
    document.getElementById('cakeScene').innerHTML+=
      '<div style="color:#fff;font-size:16px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">⚠️ Không load được Three.js — hãy dùng Live Server</div>';
    return;
  }

  const canvas=document.getElementById('threeCanvas');
  const W=window.innerWidth, H=window.innerHeight;

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H,false);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;

  window.addEventListener('resize',()=>{
    const w=window.innerWidth,h=window.innerHeight;
    renderer.setSize(w,h,false);
    cam.aspect=w/h;cam.updateProjectionMatrix();
  });

  /* Scene — background hồng nhạt */
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0xff85b3);
  scene.fog=new THREE.Fog(0xff85b3,22,45);

  /* Camera — zoom out để thấy toàn bộ bánh cân đối */
  const cam=new THREE.PerspectiveCamera(36,W/H,.1,200);
  cam.position.set(0,4.2,17);
  cam.lookAt(0,2.8,0);

  /* Lights */
  scene.add(new THREE.AmbientLight(0xfff0f5,1.1));
  const key=new THREE.DirectionalLight(0xfff5e0,1.0);
  key.position.set(5,12,8);key.castShadow=true;
  key.shadow.mapSize.set(1024,1024);
  key.shadow.camera.left=key.shadow.camera.bottom=-8;
  key.shadow.camera.right=key.shadow.camera.top=8;
  scene.add(key);
  const fill=new THREE.DirectionalLight(0xffaacc,.45);
  fill.position.set(-6,3,-4);scene.add(fill);
  const rim=new THREE.DirectionalLight(0xff88cc,.35);
  rim.position.set(0,2,-10);scene.add(rim);
  const warm=new THREE.PointLight(0xffcc88,.55,22);
  warm.position.set(0,10,0);scene.add(warm);

  /* ─── Texture helpers ─── */
  function lc(h,p){
    const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return`rgb(${Math.min(255,r+p*2.55)|0},${Math.min(255,g+p*2.55)|0},${Math.min(255,b+p*2.55)|0})`;
  }
  function dc(h,p){
    const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return`rgb(${Math.max(0,r-p*2.55)|0},${Math.max(0,g-p*2.55)|0},${Math.max(0,b-p*2.55)|0})`;
  }
  function heart2d(ctx,x,y,s,col){
    ctx.save();ctx.fillStyle=col;ctx.beginPath();
    ctx.moveTo(x,y+s*.3);
    ctx.bezierCurveTo(x,y-s*.3,x-s,y-s*.3,x-s,y+s*.1);
    ctx.bezierCurveTo(x-s,y+s*.6,x,y+s,x,y+s*1.1);
    ctx.bezierCurveTo(x,y+s,x+s,y+s*.6,x+s,y+s*.1);
    ctx.bezierCurveTo(x+s,y-s*.3,x,y-s*.3,x,y+s*.3);
    ctx.fill();ctx.restore();
  }
  function star2d(ctx,cx,cy,r,col){
    ctx.save();ctx.fillStyle=col;ctx.beginPath();
    for(let i=0;i<10;i++){
      const rad=i%2===0?r:r*.42;
      const a=(i/10)*Math.PI*2-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad)
           :ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);
    }ctx.closePath();ctx.fill();ctx.restore();
  }
  function flower2d(ctx,cx,cy,r){
    ctx.save();
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();
      ctx.arc(cx+Math.cos(a)*r*.65,cy+Math.sin(a)*r*.65,r*.5,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(255,215,0,.42)';ctx.beginPath();ctx.arc(cx,cy,r*.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function scallop(ctx,w,y,h,col){
    ctx.save();ctx.fillStyle=col;
    const n=36,sw=w/n;
    ctx.beginPath();ctx.moveTo(0,y+h);
    for(let i=0;i<n;i++)ctx.quadraticCurveTo(sw*i+sw/2,y-7,sw*(i+1),y+h);
    ctx.lineTo(w,y+h+10);ctx.lineTo(0,y+h+10);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.4;
    ctx.beginPath();
    for(let i=0;i<n;i++){ctx.moveTo(sw*i,y+h);ctx.quadraticCurveTo(sw*i+sw/2,y-3,sw*(i+1),y+h);}
    ctx.stroke();ctx.restore();
  }

  function makeSideTex(hex,patFn){
    const CW=1024,CH=460;
    const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;
    const ctx=cv.getContext('2d');
    const grd=ctx.createLinearGradient(0,0,0,CH);
    grd.addColorStop(0,lc(hex,24));grd.addColorStop(.5,hex);grd.addColorStop(1,dc(hex,18));
    ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
    scallop(ctx,CW,0,34,'#fff8dc');
    scallop(ctx,CW,CH-34,34,'#fff8dc');
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1.8;
    ctx.strokeRect(14,50,CW-28,CH-100);
    patFn(ctx,CW,CH);
    /* photo placeholders */
    const cnt=4,fw=105,fh=CH*.45,fy=(CH-fh)/2+6;
    for(let i=0;i<cnt;i++){
      const fx=CW/cnt*i+(CW/cnt-fw)/2;
      ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.roundRect(fx+4,fy+5,fw,fh,11);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.86)';ctx.beginPath();ctx.roundRect(fx,fy,fw,fh,10);ctx.fill();
      ctx.fillStyle=lc(hex,16);ctx.globalAlpha=.48;
      ctx.beginPath();ctx.roundRect(fx+8,fy+8,fw-16,fh-16,7);ctx.fill();
      ctx.globalAlpha=1;
      heart2d(ctx,fx+fw/2,fy+fh/2,15,'rgba(255,255,255,.65)');
      ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.6;
      ctx.beginPath();ctx.roundRect(fx,fy,fw,fh,10);ctx.stroke();
    }
    const t=new THREE.CanvasTexture(cv);t.wrapS=THREE.RepeatWrapping;return t;
  }

  function makeCapTex(hex,pat,isTop){
    const SZ=512;
    const cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;
    const ctx=cv.getContext('2d');
    const cx=SZ/2,cy=SZ/2,R=SZ/2-2;
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    grd.addColorStop(0,lc(hex,28));grd.addColorStop(.65,hex);grd.addColorStop(1,dc(hex,14));
    ctx.fillStyle=grd;ctx.fillRect(0,0,SZ,SZ);
    if(isTop){
      for(let k=1;k<=4;k++){
        ctx.strokeStyle=`rgba(255,248,220,${.28-k*.04})`;ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(cx,cy,R*(k*.22),0,Math.PI*2);ctx.stroke();
      }
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=13;
      ctx.beginPath();ctx.arc(cx,cy,R*.88,0,Math.PI*2);ctx.stroke();
      if(pat==='hearts'){
        for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;heart2d(ctx,cx+Math.cos(a)*R*.6,cy+Math.sin(a)*R*.6,11,'rgba(255,255,255,.28)');}
        flower2d(ctx,cx,cy,26);
      }else if(pat==='stars'){
        for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;star2d(ctx,cx+Math.cos(a)*R*.6,cy+Math.sin(a)*R*.6,12,'rgba(255,255,200,.35)');}
        star2d(ctx,cx,cy,22,'rgba(255,215,0,.45)');
      }else{
        for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;flower2d(ctx,cx+Math.cos(a)*R*.58,cy+Math.sin(a)*R*.58,15);}
        ctx.fillStyle='rgba(255,215,0,.52)';ctx.beginPath();ctx.arc(cx,cy,13,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fill();
      }
      const spc=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcb','#ff9f43'];
      for(let i=0;i<70;i++){
        const a=Math.random()*Math.PI*2,rr=Math.random()*R*.86;
        ctx.save();ctx.translate(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);
        ctx.rotate(Math.random()*Math.PI);
        ctx.fillStyle=spc[Math.floor(Math.random()*spc.length)];
        ctx.fillRect(-4.5,-1.3,9,2.6);ctx.restore();
      }
    }else{
      for(let k=1;k<=3;k++){ctx.strokeStyle='rgba(255,248,220,.1)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,R*(k*.28),0,Math.PI*2);ctx.stroke();}
    }
    ctx.restore();
    return new THREE.CanvasTexture(cv);
  }

  /* tier builder */
  function addRim(grp,R,y){
    const m=new THREE.Mesh(
      new THREE.TorusGeometry(R,.11,10,64),
      new THREE.MeshStandardMaterial({color:0xfff8dc,roughness:.28,metalness:0})
    );m.rotation.x=Math.PI/2;m.position.y=y;grp.add(m);
  }
  function addRosette(grp,x,y,z,sz,col){
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:.3,metalness:0});
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      const p=new THREE.Mesh(new THREE.SphereGeometry(sz*.43,8,8),mat);
      p.position.set(x+Math.cos(a)*sz*.33,y,z+Math.sin(a)*sz*.33);p.scale.y=.52;grp.add(p);
    }
    const c=new THREE.Mesh(new THREE.SphereGeometry(sz*.25,8,8),
      new THREE.MeshStandardMaterial({color:0xffd700,roughness:.2,metalness:.3}));
    c.position.set(x,y+sz*.13,z);c.scale.y=.46;grp.add(c);
  }
  function patH(ctx,W,H){for(let r=0;r<3;r++)for(let c2=0;c2<13;c2++){const x=c2*(W/13)+(W/13)/2+(r%2?(W/26):0),y=r*((H-88)/3)+(H-88)/6+46;heart2d(ctx,x,y,11,'rgba(255,255,255,.22)');}}
  function patS(ctx,W,H){for(let r=0;r<3;r++)for(let c2=0;c2<13;c2++){const x=c2*(W/13)+(W/13)/2+(r%2?(W/26):0),y=r*((H-88)/3)+(H-88)/6+48;star2d(ctx,x,y,9,'rgba(255,255,200,.3)');}}
  function patF(ctx,W,H){for(let r=0;r<3;r++)for(let c2=0;c2<11;c2++){const x=c2*(W/11)+(W/11)/2+(r%2?(W/22):0),y=r*((H-88)/3)+(H-88)/6+48;flower2d(ctx,x,y,11);}}

  function buildTier(hex,R,H,posY,pat,patFn){
    const grp=new THREE.Group();
    const geo=new THREE.CylinderGeometry(R,R,H,64,1,false);
    const mesh=new THREE.Mesh(geo,[
      new THREE.MeshStandardMaterial({map:makeSideTex(hex,patFn),roughness:.42,metalness:.04}),
      new THREE.MeshStandardMaterial({map:makeCapTex(hex,pat,true),roughness:.36,metalness:.04}),
      new THREE.MeshStandardMaterial({map:makeCapTex(hex,pat,false),roughness:.42,metalness:.04}),
    ]);
    mesh.castShadow=true;mesh.receiveShadow=true;grp.add(mesh);
    addRim(grp,R+.04,H/2);addRim(grp,R+.04,-H/2);
    const rc=Math.max(6,Math.round(R*2.6));
    const rcol=pat==='hearts'?0xffb6c1:pat==='stars'?0xadd8e6:0xdda0dd;
    for(let i=0;i<rc;i++){
      const a=(i/rc)*Math.PI*2;
      addRosette(grp,Math.cos(a)*(R-.38),H/2+.05,Math.sin(a)*(R-.38),.25,rcol);
    }
    grp.position.y=posY;scene.add(grp);return grp;
  }

  /* ── KHÔNG có đĩa/table ── chỉ có bánh 3 tầng */
  /* ✅ Bánh nhỏ hơn để nhìn trọn vẹn cân đối */
  const T1H=1.6, T2H=1.3, T3H=1.05;
  const T1R=3.0, T2R=2.2, T3R=1.5;
  const BASE=0;
  const g1=buildTier('#ff7fb0',T1R,T1H,BASE+T1H/2,'hearts',patH);
  const g2=buildTier('#7fc4ff',T2R,T2H,BASE+T1H+T2H/2,'stars',patS);
  const g3=buildTier('#bf8fe0',T3R,T3H,BASE+T1H+T2H+T3H/2,'flowers',patF);
  const TOP=BASE+T1H+T2H+T3H;

  /* nến */
  let flA,flB,flPt;
  (()=>{
    const cH=1.2,cY=TOP+cH/2;
    const body=new THREE.Mesh(
      new THREE.CylinderGeometry(.09,.09,cH,16),
      new THREE.MeshStandardMaterial({color:0xff4466,roughness:.5,metalness:.1})
    );body.position.set(0,cY,0);body.castShadow=true;scene.add(body);
    const sm=new THREE.MeshStandardMaterial({color:0xffffff});
    for(let s=0;s<5;s++){
      const st=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,cH*.055,16),sm);
      st.position.set(0,TOP+cH*.1+s*cH*.22,0);scene.add(st);
    }
    const wk=new THREE.Mesh(new THREE.CylinderGeometry(.013,.013,.18,8),
      new THREE.MeshStandardMaterial({color:0x222222}));
    wk.position.set(0,TOP+cH+.09,0);scene.add(wk);
    const fy=TOP+cH+.36;
    flA=new THREE.Mesh(new THREE.SphereGeometry(.13,10,10),
      new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff4400,emissiveIntensity:2.8,transparent:true,opacity:.92}));
    flA.position.set(0,fy,0);flA.scale.set(1,2.4,1);scene.add(flA);
    flB=new THREE.Mesh(new THREE.SphereGeometry(.06,10,10),
      new THREE.MeshStandardMaterial({color:0xffff55,emissive:0xffff99,emissiveIntensity:3.5,transparent:true,opacity:.97}));
    flB.position.set(0,fy-.04,0);flB.scale.set(1,2.7,1);scene.add(flB);
    const halo=new THREE.Mesh(new THREE.SphereGeometry(.36,16,16),
      new THREE.MeshBasicMaterial({color:0xff8844,transparent:true,opacity:.07,blending:THREE.AdditiveBlending,depthWrite:false}));
    halo.position.set(0,fy,0);scene.add(halo);
    flPt=new THREE.PointLight(0xff9944,.9,12);
    flPt.position.set(0,fy+.18,0);scene.add(flPt);
  })();

  /* particles */
  (()=>{
    const N=140,pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      pos[i*3]=(Math.random()-.5)*22;pos[i*3+1]=Math.random()*16;pos[i*3+2]=(Math.random()-.5)*22;
      const c=new THREE.Color().setHSL(Math.random(),.75,.65);
      col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:.08,vertexColors:true,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false}));
    pts.name='pts';scene.add(pts);
  })();

  /* drag orbit */
  let autoA=0,userA=0,drag=false,lastX=0;
  canvas.addEventListener('mousedown', e=>{drag=true;lastX=e.clientX;});
  canvas.addEventListener('mousemove', e=>{if(drag){userA+=(e.clientX-lastX)*.009;lastX=e.clientX;}});
  canvas.addEventListener('mouseup',   ()=>drag=false);
  canvas.addEventListener('mouseleave',()=>drag=false);
  canvas.addEventListener('touchstart',e=>{drag=true;lastX=e.touches[0].clientX;},{passive:true});
  canvas.addEventListener('touchmove', e=>{if(drag){userA+=(e.touches[0].clientX-lastX)*.009;lastX=e.touches[0].clientX;}},{passive:true});
  canvas.addEventListener('touchend',  ()=>drag=false);

  /* render loop */
  const SPD=0.26;
  let prev=performance.now();
  function loop(){
    requestAnimationFrame(loop);
    const now=performance.now(),dt=(now-prev)/1000;prev=now;
    const t=now/1000;
    if(!drag)autoA+=dt*.30;
    const angle=autoA+userA;
    cam.position.x=Math.sin(angle)*17;
    cam.position.z=Math.cos(angle)*17;
    cam.position.y=4.2+Math.sin(t*.18)*.25;
    cam.lookAt(0,2.8,0);
    g1.rotation.y= t*SPD;
    g2.rotation.y=-t*SPD;
    g3.rotation.y= t*SPD;
    if(flA&&flB&&flPt){
      const flk=Math.sin(t*13)*.02+Math.sin(t*19)*.011;
      const sc=1+Math.sin(t*10)*.15;
      flA.position.y=TOP+1.2+.36+flk;
      flB.position.y=TOP+1.2+.32+flk;
      flA.scale.set(sc,2.4+Math.sin(t*15)*.24,sc);
      flPt.intensity=.9+Math.sin(t*11)*.3;
    }
    const fp=scene.getObjectByName('pts');
    if(fp){
      const pa=fp.geometry.attributes.position.array;
      for(let i=0;i<pa.length;i+=3){pa[i+1]+=.005;if(pa[i+1]>16)pa[i+1]=0;pa[i]+=Math.sin(t*.4+i)*.0006;}
      fp.geometry.attributes.position.needsUpdate=true;
    }
    renderer.render(scene,cam);
  }
  loop();

  document.getElementById('letterBtn').addEventListener('click',openOverlay);
}

/* ════════════════════════════════
   ZOOM LIGHTBOX
════════════════════════════════ */
function zoomImg(imgEl){
  const lb=document.getElementById('lightbox');
  const lbImg=document.getElementById('lbImg');
  lbImg.src=imgEl.src;
  lb.classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lbImg').src='';
}

/* ════════════════════════════════
   OVERLAY
════════════════════════════════ */
function openOverlay(){
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))resetOv();
});
document.getElementById('openBtn').addEventListener('click',()=>{
  const card=document.getElementById('card');
  card.classList.add('gone');
  setTimeout(()=>card.style.display='none',420);
  document.getElementById('letter').classList.add('show');
  typeIt(wishTxt,()=>document.getElementById('confessBtn').classList.add('show'));
});
document.getElementById('confessBtn').addEventListener('click',()=>{
  clearInterval(tyT);clearTimeout(dnT);
  document.getElementById('confessBtn').classList.remove('show');
  document.getElementById('ltrBody').textContent='';
  typeIt(confessTxt,()=>{});
});
function resetOv(){
  clearInterval(tyT);clearTimeout(dnT);
  document.getElementById('overlay').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('card').style.display='';
    document.getElementById('card').classList.remove('gone');
    document.getElementById('letter').classList.remove('show');
    document.getElementById('ltrBody').textContent='';
    document.getElementById('confessBtn').classList.remove('show');
  },350);
}

const wishTxt=
`Chúc mừng sinh nhật em 🎂

Chúc em tuổi mới luôn xinh đẹp,
rạng rỡ và gặp thật nhiều điều ngọt ngào.

Mong năm nay là năm em rực rỡ nhất,
cười nhiều hơn, bình an hơn,
và mọi điều em mong đều đến đúng lúc.

Sinh nhật vui vẻ nha em 💗`;

const confessTxt=
`Thật ra… anh thích em.
Không ồn ào, nhưng rất nghiêm túc.

Anh muốn quan tâm em nhiều hơn,
muốn ở cạnh em trong những ngày vui
và cả những ngày em mệt nữa.

Nếu em cho anh cơ hội,
anh muốn cùng em tạo thêm
thật nhiều kỷ niệm đẹp 🌸`;

let tyT=null,dnT=null;
function typeIt(txt,cb){
  clearInterval(tyT);clearTimeout(dnT);
  const el=document.getElementById('ltrBody');
  el.textContent='';let i=0;
  tyT=setInterval(()=>{
    el.textContent+=txt[i]||'';i++;
    if(i>=txt.length){clearInterval(tyT);dnT=setTimeout(()=>cb&&cb(),3000);}
  },26);
}
</script>
